on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "**.py"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  meta:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: set_tag
        run: |
          # 检查标签格式
          is_release=${{ startsWith(github.ref, 'refs/tags/v') }}
          tag=$(git describe --tags --match "v*" ${{ github.ref }} || true)
          if [[ $tag != v* ]]; then
            tag=$(curl -sX GET "https://api.github.com/repos/${{ github.repository }}/releases/latest" --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' | awk '/tag_name/{print $4}' FS='["\x27]')
            if [[ $tag != v* ]]; then
              tag="v0.0.0"
            fi
            tag=$(date "+$tag-%y%m%d-$(git rev-parse --short HEAD)")
          fi
      
          if ! $($is_release) ; then
            prefix=${tag%-*-*}
            suffix=${tag#$prefix-}
            tag="$prefix-ci.$suffix"
          fi
      
          # 检查是否为预发布版本
          is_prerelease=false
          if [[ $tag =~ .*alpha.* || $tag =~ .*beta.* || $tag =~ .*rc.* || $tag =~ .*dev.* || $tag =~ .*-ci.* ]]; then
            is_prerelease=true
            echo "This is a pre-release version"
          fi

          echo tag=$tag | tee -a $GITHUB_OUTPUT
          echo is_release=$is_release | tee -a $GITHUB_OUTPUT
          echo is_prerelease=$is_prerelease | tee -a $GITHUB_OUTPUT
          echo "repo_name=$(echo ${{ github.repository }} | cut -d'/' -f2)" >> $GITHUB_OUTPUT
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      is_release: ${{ steps.set_tag.outputs.is_release }}
      is_prerelease: ${{ steps.set_tag.outputs.is_prerelease }}
      repo_name: ${{ steps.set_tag.outputs.repo_name }}

  build-mwu:
    env:
      UV_INDEX: https://pypi.org/simple
      repo_name: ${{ needs.meta.outputs.repo_name }}
      tag: ${{ needs.meta.outputs.tag }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            platform: win
            arch: x86_64
    runs-on: ${{ matrix.os }}
    name: Build MWU (${{ matrix.platform }}-${{ matrix.arch }})
    needs: meta

    steps:
      - name: Check-out repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: 'Workaround for missing zstd in windows-11-arm'
        if: false # Disabled as ARM64 build is removed
        run: choco install zstandard

      - name: Install uv
        uses: astral-sh/setup-uv@v7.5.0
        with:
          enable-cache: true

      - name: Download MaaFramework
        id: download_mfw
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-${{ matrix.platform }}-${{ matrix.arch }}*"
          latest: true
          out-file-path: "deps"
          extract: true

      - name: Flatten MaaFramework directory
        shell: bash
        run: |
          # 查找解压后的 MaaFramework 目录并移动内容到 deps 根目录
          MFW_DIR=$(find deps -maxdepth 1 -type d -name "MAA-*" | head -n 1)
          if [ -n "$MFW_DIR" ] && [ "$MFW_DIR" != "deps" ]; then
            echo "Moving contents from $MFW_DIR to deps/"
            mv "$MFW_DIR"/* deps/
            mv "$MFW_DIR"/.* deps/ 2>/dev/null || true
            rmdir "$MFW_DIR"
          fi
          ls -la deps/

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12.10"

      - name: Copy Resources
        shell: bash
        run: |
          # 使用 MWU 官方的资源复制脚本
          curl -L https://github.com/ravizhan/MWU/raw/refs/heads/main/deploy/copy_resources.py -o ./copy_resources.py
          uv run ./copy_resources.py

      - name: Download Python Dependencies
        shell: bash
        run: |
          # 使用 MWU 官方的依赖下载脚本
          curl -L https://github.com/ravizhan/MWU/raw/refs/heads/main/deploy/download_deps.py -o ./download_deps.py
          uv run ./download_deps.py

      - name: Download MWU Artifact
        id: download_mwu
        uses: robinraju/release-downloader@v1
        with:
          repository: ravizhan/MWU
          latest: true
          fileName: MWU-${{ matrix.platform }}-${{ matrix.arch }}-*.7z
          out-file-path: ./

      - name: Setup & Install MWU
        shell: bash
        run: |
          # 1. 解压 MWU (MWU 自身包含 Nuitka 编译好的 Python 环境)
          MWU_FILE=$(ls MWU-*.7z | head -n 1)
          7z x "$MWU_FILE" -obuild -y
          
          # 2. 调用脚本完成资源组装与 deps 依赖注入
          # install-MWU.py 现在会自动在 build/deps 中安装 cv2 和 numpy
          python tools/install-MWU.py ${{ env.tag }} ${{ matrix.platform }} ${{ matrix.arch }}

      - name: Get clean version
        id: get_version
        shell: bash
        run: |
          tag="${{ env.tag }}"
          version=$(echo "$tag" | sed 's/^v//; s/Avalonia$//; s/MWU$//')
          echo "clean_version=$version" >> $GITHUB_OUTPUT

      - name: Compress Final Artifact
        run: |
          7z a -t7z -mx=9 -mmt -ms -r ${{ env.repo_name }}-${{ matrix.platform }}-${{ matrix.arch }}-v${{ steps.get_version.outputs.clean_version }}-MWU.7z "./build/*"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.repo_name }}-${{ matrix.platform }}-${{ matrix.arch }}-v${{ steps.get_version.outputs.clean_version }}-MWU
          path: ${{ env.repo_name }}-${{ matrix.platform }}-${{ matrix.arch }}-v${{ steps.get_version.outputs.clean_version }}-MWU.7z

  build-mxu:
    env:
      repo_name: ${{ needs.meta.outputs.repo_name }}
      tag: ${{ needs.meta.outputs.tag }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            platform: win
            arch: x86_64
    runs-on: ${{ matrix.os }}
    name: Build MXU (${{ matrix.platform }}-${{ matrix.arch }})
    needs: meta

    steps:
      - name: Check-out repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Download MaaFramework
        id: download_mfw
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-${{ matrix.platform }}-${{ matrix.arch }}*"
          latest: true
          out-file-path: "deps"
          extract: true

      - name: Flatten MaaFramework directory
        shell: bash
        run: |
          # 查找解压后的 MaaFramework 目录并移动内容到 deps 根目录
          MFW_DIR=$(find deps -maxdepth 1 -type d -name "MAA-*" | head -n 1)
          if [ -n "$MFW_DIR" ] && [ "$MFW_DIR" != "deps" ]; then
            echo "Moving contents from $MFW_DIR to deps/"
            mv "$MFW_DIR"/* deps/
            mv "$MFW_DIR"/.* deps/ 2>/dev/null || true
            rmdir "$MFW_DIR"
          fi
          ls -la deps/

      - name: Download MXU
        id: download_mxu
        uses: robinraju/release-downloader@v1
        with:
          repository: MistEO/MXU
          fileName: "MXU-${{ matrix.platform }}-${{ matrix.arch }}*"
          latest: true
          out-file-path: "MXU"
          extract: true

      - name: Clean up MXU archive
        shell: bash
        run: |
          ARCHIVE_FILE_PATH="${{ fromJson(steps.download_mxu.outputs.downloaded_files)[0] }}"
          rm -f "${ARCHIVE_FILE_PATH}"
          echo "Archive cleanup command executed for MXU."

      - name: Setup Embed Python
        shell: bash
        run: |
          python tools/setup_embed_python.py
          
      - name: Install Python Dependencies to Embed Python
        shell: bash
        run: |
          ./install/python/python.exe install/python/get-pip.py
          ./install/python/python.exe -m pip install --upgrade pip
          ./install/python/python.exe -m pip install -r requirements.txt

      - name: Create MXU version
        shell: bash
        run: |
          ./install/python/python.exe tools/install-MXU.py ${{ env.tag }}
          cp -rpvn install/python/. install-mxu/python/

      - name: Copy MXU executable
        shell: bash
        run: |
          if [ -d "MXU" ]; then
            echo "Copying MXU files to install-mxu directory..."
            mkdir -p install-mxu
            if [ -f "MXU/mxu.exe" ]; then
              cp MXU/mxu.exe install-mxu/MaaFgo.exe
            elif [ -f "MXU/mxu" ]; then
              cp MXU/mxu install-mxu/MaaFgo
            fi
          else
            echo "MXU directory not found, skipping copy."
          fi

      - name: Get clean version
        id: get_version
        shell: bash
        run: |
          tag="${{ env.tag }}"
          version=$(echo "$tag" | sed 's/^v//; s/Avalonia$//; s/MWU$//')
          echo "clean_version=$version" >> $GITHUB_OUTPUT

      - name: Compress MXU Artifact
        run: |
          7z a -t7z -mx=9 -mmt -ms -r ${{ env.repo_name }}-${{ matrix.platform }}-${{ matrix.arch }}-v${{ steps.get_version.outputs.clean_version }}-MXU.7z "./install-mxu/*"

      - name: Upload MXU Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.repo_name }}-${{ matrix.platform }}-${{ matrix.arch }}-v${{ steps.get_version.outputs.clean_version }}-MXU
          path: ${{ env.repo_name }}-${{ matrix.platform }}-${{ matrix.arch }}-v${{ steps.get_version.outputs.clean_version }}-MXU.7z

  build-avalonia:
    needs: meta
    env:
      repo_name: ${{ needs.meta.outputs.repo_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: win
            arch: x86_64
            runner: windows-latest
      fail-fast: false

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Download MaaFramework
        id: download_mfw
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-${{ matrix.os }}-${{ matrix.arch }}*"
          latest: true
          out-file-path: "deps"
          extract: true

      - name: Flatten MaaFramework directory
        shell: bash
        run: |
          # 查找解压后的 MaaFramework 目录并移动内容到 deps 根目录
          MFW_DIR=$(find deps -maxdepth 1 -type d -name "MAA-*" | head -n 1)
          if [ -n "$MFW_DIR" ] && [ "$MFW_DIR" != "deps" ]; then
            echo "Moving contents from $MFW_DIR to deps/"
            mv "$MFW_DIR"/* deps/
            mv "$MFW_DIR"/.* deps/ 2>/dev/null || true
            rmdir "$MFW_DIR"
          fi
          ls -la deps/

      - name: Download Python Dependencies
        shell: bash
        run: |
          python tools/download_deps.py ${{ matrix.os }} ${{ matrix.arch }}

      - name: Download FGO-MFAAvalonia
        id: download_mfa
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MFAAvalonia
          fileName: "MFAAvalonia-*-win-${{ (matrix.arch == 'x86_64' && 'x64') || (matrix.arch == 'aarch64' && 'arm64') }}*"
          latest: true
          out-file-path: "MFA"
          extract: true

      - name: Clean up MFAAvalonia archive
        shell: bash
        run: |
          ARCHIVE_FILE_PATH="${{ fromJson(steps.download_mfa.outputs.downloaded_files)[0] }}"
          rm -f "${ARCHIVE_FILE_PATH}"
          echo "Archive cleanup command executed for MFAAvalonia."

      - name: Setup & Install Avalonia
        shell: bash
        run: |
          # 1. 配置嵌入式 Python (仅下载和解压)
          python tools/setup_embed_python.py install/python ${{ matrix.arch == 'x86_64' && 'amd64' || 'arm64' }}
          
          # 2. 安装依赖 (M9A 模式：直接在 CI 环境中通过 pip 安装到嵌入式 Python)
          ./install/python/python.exe install/python/get-pip.py
          ./install/python/python.exe -m pip install --upgrade pip
          ./install/python/python.exe -m pip install -r requirements.txt
          
          # 3. 准备 MFA 文件（-n 不覆盖已存在的 python 目录）
          mkdir -p install
          cp -rpvn MFA/. install/
          rm -rf install/runtimes
          
          # 4. 调用脚本完成资源组装
          python tools/install-Avalonia.py ${{ needs.meta.outputs.tag }} ${{ matrix.os }} ${{ matrix.arch }}

      - name: Get version without suffix
        id: get_version
        shell: bash
        run: |
          tag="${{ needs.meta.outputs.tag }}"
          version=$(echo "$tag" | sed 's/^v//; s/Avalonia$//; s/MWU$//')
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Compress Avalonia artifact
        shell: bash
        run: |
          7z a -t7z -mx=9 -mmt -ms -r -- ./${{ env.repo_name }}-${{ matrix.os }}-${{ matrix.arch }}-v${{ steps.get_version.outputs.version }}-MFAA.7z ./install/*

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.repo_name }}-${{ matrix.os }}-${{ matrix.arch }}-v${{ steps.get_version.outputs.version }}-MFAA
          path: ${{ env.repo_name }}-${{ matrix.os }}-${{ matrix.arch }}-v${{ steps.get_version.outputs.version }}-MFAA.7z

  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          # 正式版：使用 tag-pattern 只匹配正式版标签，包含所有从上一个正式版以来的提交
          # 预发布版：正常生成，只包含从上一个标签以来的提交
          args: >-
            -vv --latest --strip header
            ${{ needs.meta.outputs.is_prerelease == 'false' && '--tag-pattern "^v[0-9]+\\.[0-9]+\\.[0-9]+$"' || '' }}
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  debug:
    if: ${{ needs.meta.outputs.is_release == 'false' }}
    runs-on: ubuntu-slim
    needs: [meta, build-mwu, build-avalonia, build-mxu, changelog]
    steps:
      - name: Show Outputs
        run: |
          echo "Tag: ${{ needs.meta.outputs.tag }}"
          echo "Is Release: ${{ needs.meta.outputs.is_release }}"
          echo "Is Pre-release: ${{ needs.meta.outputs.is_prerelease }}"
          echo "Changelog:"
          echo "${{ needs.changelog.outputs.release_body }}"

  release:
    if: ${{ needs.meta.outputs.is_release == 'true' }}
    needs: [meta, build-mwu, build-avalonia, build-mxu, changelog]
    runs-on: ubuntu-slim
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: release

      - uses: softprops/action-gh-release@v2.2.2
        with:
          files: release/**/*.7z
          tag_name: ${{ needs.meta.outputs.tag }}
          body: ${{ needs.changelog.outputs.release_body }}
          draft: false
          prerelease: ${{ needs.meta.outputs.is_prerelease == 'true' }}

      - name: Trigger MirrorChyanUploading
        if: ${{ github.repository_owner == 'xlxyvergil' }}
        shell: bash
        run: |
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release.yml -f tag=${{ needs.meta.outputs.tag }}
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release_note.yml -f tag=${{ needs.meta.outputs.tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
