name: install

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "**.py"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "**.py"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set_tag
        run: |
          # 检查标签格式
          is_release=${{ startsWith(github.ref, 'refs/tags/v') }}
          tag=$(git describe --tags --match "v*" ${{ github.ref }} || true)
          if [[ $tag != v* ]]; then
            tag=$(curl -sX GET "https://api.github.com/repos/${{ github.repository }}/releases/latest" --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' | awk '/tag_name/{print $4}' FS='["]')
            if [[ $tag != v* ]]; then
              tag="v0.0.0"
            fi
            tag=$(date "+$tag-%y%m%d-$(git rev-parse --short HEAD)")
          fi

          if ! $($is_release) ; then
            prefix=${tag%-*-*}
            suffix=${tag#$prefix-}
            tag="$prefix-ci.$suffix"
          fi

          # 检查是否为预发布版本
          is_prerelease=false
          if [[ $tag =~ .*alpha.* || $tag =~ .*beta.* || $tag =~ .*rc.* || $tag =~ .*dev.* || $tag =~ .*-ci.* ]]; then
            is_prerelease=true
            echo "This is a pre-release version"
          fi

          echo tag=$tag | tee -a $GITHUB_OUTPUT
          echo is_release=$is_release | tee -a $GITHUB_OUTPUT
          echo is_prerelease=$is_prerelease | tee -a $GITHUB_OUTPUT
          echo "repo_name=$(echo ${{ github.repository }} | cut -d'/' -f2)" >> $GITHUB_OUTPUT
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      is_release: ${{ steps.set_tag.outputs.is_release }}
      is_prerelease: ${{ steps.set_tag.outputs.is_prerelease }}
      repo_name: ${{ steps.set_tag.outputs.repo_name }}

  build-mwu:
    env:
      UV_INDEX: https://pypi.org/simple
      repo_name: ${{ needs.meta.outputs.repo_name }}
      tag: ${{ needs.meta.outputs.tag }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            platform: win
            arch: x86_64

          - os: windows-11-arm
            platform: win
            arch: aarch64
    runs-on: ${{ matrix.os }}
    name: Build MWU (${{ matrix.platform }}-${{ matrix.arch }})
    needs: meta

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: 'Workaround for missing zstd in windows-11-arm'
        if: matrix.os == 'windows-11-arm'
        run: choco install zstandard

      - name: Install uv
        uses: astral-sh/setup-uv@v7.5.0
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12.10"

      - name: Copy Resources
        shell: bash
        run: |
          curl -L https://github.com/ravizhan/MWU/raw/refs/heads/main/deploy/copy_resources.py -o ./copy_resources.py
          uv run ./copy_resources.py
          cp -r assets/options build/options
          cp -r assets/i18n build/i18n
          cp -r bbcdll build/bbcdll

      - name: Download Dependencies
        shell: bash
        run: |
          curl -L https://github.com/ravizhan/MWU/raw/refs/heads/main/deploy/download_deps.py -o ./download_deps.py
          uv run ./download_deps.py

      - name: Download Artifact from Release
        id: download_artifact
        uses: robinraju/release-downloader@v1
        with:
          repository: ravizhan/MWU
          latest: true
          fileName: MWU-${{ matrix.platform }}-${{ matrix.arch }}-*.7z
          out-file-path: ./
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decompress Artifact to build
        run: |
          7z x ${{ fromJson(steps.download_artifact.outputs.downloaded_files)[0] }} -obuild -y

      - name: Setup embedded Python
        shell: pwsh
        run: |
          $pythonVersion = "3.12.10"
          $destDir = "build/python"
          
          if (Test-Path $destDir) {
            Remove-Item -Recurse -Force $destDir
          }
          New-Item -ItemType Directory -Path $destDir -Force
          
          $arch = "${{ matrix.arch }}"
          if ($arch -eq "x86_64") {
            $winArch = "amd64"
          } else {
            $winArch = "arm64"
          }
          
          $url = "https://www.python.org/ftp/python/$pythonVersion/python-$pythonVersion-embed-$winArch.zip"
          $zipFile = "$destDir/python-embed.zip"
          
          Write-Host "Downloading Python from $url"
          Invoke-WebRequest -Uri $url -OutFile $zipFile
          
          Write-Host "Extracting Python..."
          Expand-Archive -Path $zipFile -DestinationPath $destDir -Force
          Remove-Item $zipFile
          
          # Modify ._pth file
          $pthFile = Get-ChildItem -Path $destDir -Filter "python*._pth" | Select-Object -First 1
          if ($pthFile) {
            $content = Get-Content $pthFile.FullName
            $content = $content -replace "#import site", "import site"
            $content += "`n.`nLib`nLib\site-packages`nDLLs"
            Set-Content -Path $pthFile.FullName -Value $content
            Write-Host "Modified $($pthFile.Name)"
          }
          
          # Install pip
          $getPipUrl = "https://bootstrap.pypa.io/get-pip.py"
          $getPipFile = "$destDir/get-pip.py"
          Invoke-WebRequest -Uri $getPipUrl -OutFile $getPipFile
          & "$destDir/python.exe" $getPipFile
          Remove-Item $getPipFile
          
          Write-Host "Embedded Python setup complete"
      
      - name: Install Python dependencies
        shell: bash
        run: |
          ./build/python/python.exe -m pip install -r requirements.txt

      - name: Fix bbc_team_config scan_dir for MWU
        shell: pwsh
        run: |
          $configFile = "./build/options/bbc_team_config.json"
          $content = Get-Content $configFile -Raw
          $content = $content -replace './BBchannel/settings', 'resource/BBchannel/settings'
          Set-Content $configFile $content -NoNewline

      - name: Get clean version
        id: get_version
        shell: bash
        run: |
          tag="${{ env.tag }}"
          version=$(echo "$tag" | sed 's/^v//; s/Avalonia$//; s/MWU$//')
          echo "clean_version=$version" >> $GITHUB_OUTPUT

      - name: Compress Final Artifact
        run: |
          7z a -t7z -mx=9 -mmt -ms -r ${{ env.repo_name }}-MWU-${{ matrix.platform }}-${{ matrix.arch }}-v${{ steps.get_version.outputs.clean_version }}.7z "./build/*"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.repo_name }}-MWU-${{ matrix.platform }}-${{ matrix.arch }}-v${{ steps.get_version.outputs.clean_version }}
          path: ${{ env.repo_name }}-MWU-${{ matrix.platform }}-${{ matrix.arch }}-v${{ steps.get_version.outputs.clean_version }}.7z

  build-avalonia:
    needs: meta
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: win
            arch: x86_64
            runner: windows-latest
          - os: win
            arch: aarch64
            runner: windows-11-arm
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download MaaFramework
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-${{ matrix.os }}-${{ matrix.arch }}*"
          latest: true
          out-file-path: "deps"
          extract: true

      - name: Download FGO-MFAAvalonia
        id: download_mfa
        uses: robinraju/release-downloader@v1
        with:
          repository: xlxyvergil/MFAAvalonia
          fileName: "MFAAvalonia-*-win-${{ (matrix.arch == 'x86_64' && 'x64') || (matrix.arch == 'aarch64' && 'arm64') }}*"
          latest: true
          out-file-path: "MFA"
          extract: true

      - name: Clean up MFAAvalonia archive
        shell: bash
        run: |
          ARCHIVE_FILE_PATH="${{ fromJson(steps.download_mfa.outputs.downloaded_files)[0] }}"
          rm -f "${ARCHIVE_FILE_PATH}"
          echo "Archive cleanup command executed for MFAAvalonia."

      - name: Remove built-in runtime in MFA
        shell: bash
        run: |
          rm -rf MFA/runtimes
      
      - name: Setup embedded Python
        shell: pwsh
        run: |
          $pythonVersion = "3.12.10"
          $destDir = "install/python"
          
          if (Test-Path $destDir) {
            Remove-Item -Recurse -Force $destDir
          }
          New-Item -ItemType Directory -Path $destDir -Force
          
          $arch = "${{ matrix.arch }}"
          if ($arch -eq "x86_64") {
            $winArch = "amd64"
          } else {
            $winArch = "arm64"
          }
          
          $url = "https://www.python.org/ftp/python/$pythonVersion/python-$pythonVersion-embed-$winArch.zip"
          $zipFile = "$destDir/python-embed.zip"
          
          Write-Host "Downloading Python from $url"
          Invoke-WebRequest -Uri $url -OutFile $zipFile
          
          Write-Host "Extracting Python..."
          Expand-Archive -Path $zipFile -DestinationPath $destDir -Force
          Remove-Item $zipFile
          
          # Modify ._pth file
          $pthFile = Get-ChildItem -Path $destDir -Filter "python*._pth" | Select-Object -First 1
          if ($pthFile) {
            $content = Get-Content $pthFile.FullName
            $content = $content -replace "#import site", "import site"
            $content += "`n.`nLib`nLib\site-packages`nDLLs"
            Set-Content -Path $pthFile.FullName -Value $content
            Write-Host "Modified $($pthFile.Name)"
          }
          
          # Install pip
          $getPipUrl = "https://bootstrap.pypa.io/get-pip.py"
          $getPipFile = "$destDir/get-pip.py"
          Invoke-WebRequest -Uri $getPipUrl -OutFile $getPipFile
          & "$destDir/python.exe" $getPipFile
          Remove-Item $getPipFile
          
          Write-Host "Embedded Python setup complete"
      
      - name: Install Python dependencies
        shell: bash
        run: |
          ./install/python/python.exe -m pip install -r requirements.txt

      - name: Install
        shell: pwsh
        run: |
          if (Test-Path "MFA") {
            Write-Host "Copying MFA files to install directory..."
            New-Item -ItemType Directory -Path "install" -Force
            Copy-Item -Path "MFA\*" -Destination "install" -Recurse -Force
            Write-Host "MFA files copied successfully."
          } else {
            Write-Host "MFA directory not found, skipping copy."
          }

          cd tools
          python -m pip install json-with-comments
          python ./install.py ${{ needs.meta.outputs.tag }} ${{ matrix.os }} ${{ matrix.arch }}
          cd ..

      - name: Get version without suffix
        id: get_version
        shell: bash
        run: |
          tag="${{ needs.meta.outputs.tag }}"
          version=$(echo "$tag" | sed 's/^v//; s/Avalonia$//; s/MWU$//')
          echo "version=$version" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: MaaFGO-Avalonia-${{ matrix.os }}-${{ matrix.arch }}-v${{ steps.get_version.outputs.version }}
          path: "install"

  changelog:
    name: Generate changelog
    needs: meta
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          args: >-
            -vv --latest --strip header
            ${{ needs.meta.outputs.is_prerelease == 'false' && '--tag-pattern "^v[0-9]+\\.[0-9]+\\.[0-9]+[A-Za-z0-9_]*$"' || '' }}
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  release:
    if: ${{ needs.meta.outputs.is_release == 'true' }}
    needs: [meta, build-mwu, build-avalonia, changelog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release

      - name: List downloaded artifacts
        run: |
          echo "=== Release directory structure ==="
          find release -type f | head -50
          echo "=================================="

      - name: Package Avalonia artifacts
        run: |
          mkdir -p release-packed
          cd release
          for f in *; do
            if [ -d "$f" ] && echo "$f" | grep -q "Avalonia"; then
              # Extract arch from name like MaaFGO-Avalonia-win-x86_64-v1.1.13
              arch=$(echo "$f" | sed 's/MaaFGO-Avalonia-win-//; s/-v[0-9].*//')
              echo "Packaging: $f -> MaaFGO-Avalonia-win-${arch}.zip"
              (cd "$f" && zip -r "../../release-packed/MaaFGO-Avalonia-win-${arch}.zip" .)
            fi
          done
          echo "=== Packed files ==="
          ls -lh release-packed/

      - uses: softprops/action-gh-release@v2.2.2
        with:
          files: |
            release/**/*.7z
            release-packed/*.zip
          tag_name: ${{ needs.meta.outputs.tag }}
          body: ${{ needs.changelog.outputs.release_body }}
          draft: false
          prerelease: ${{ needs.meta.outputs.is_prerelease == 'true' }}
