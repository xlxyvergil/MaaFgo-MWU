name: mirrorchyan_release

on:
  workflow_dispatch:
    inputs:
      tag:
        default: ''
        required: false

jobs:
  mirrorchyan:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        os: [win]
        arch: [x86_64]
    steps:
      - uses: MirrorChyan/uploading-action@v1
        with:
          filetype: latest-release
          filename: MaaFgo-*-MXU
          mirrorchyan_rid: MaaFgo
          tag: ${{ inputs.tag }}
          p7zip: true

          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}

          owner: xlxyvergil
          repo: MaaFgo
          github_token: ${{ secrets.GITHUB_TOKEN }}
          upload_token: ${{ secrets.MirrorChyanUploadToken }}
