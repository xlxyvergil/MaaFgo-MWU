name: AI Code Review

# 1. 配置触发时机：支持 PR 事件 + 手动按钮触发
on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: # 允许在 Actions 页面手动点击运行

permissions:
  contents: read
  pull-requests: write   # 允许 Action 在 PR 中发表评论

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run AI Review
        # 👇 关键：换成了真实存在的开源 Action
        uses: anc95/ChatGPT-CodeReview@main 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}      # GitHub 自带令牌
          OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }} # 我们配的 DeepSeek 密钥
          OPENAI_API_BASE: "https://api.deepseek.com/v1" # DeepSeek 的兼容接口
