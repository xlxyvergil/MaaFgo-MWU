# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

# ==================== 基础设置（官方支持字段）====================
language: "zh-CN"                  # 强制中文回复
early_access: false                # 关闭早期访问功能
# ==================== 审查行为设置（官方允许字段）====================
reviews:
  profile: "assertive"             # 严格审查模式（chill/assertive）
  auto_review:
    enabled: true                  # 启用自动审查
    drafts: false                  # 不审查草稿PR
